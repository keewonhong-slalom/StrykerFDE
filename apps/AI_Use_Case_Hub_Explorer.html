or email history. ​\nCE EU RAG Salesforce -\nTo enable customer experience colleagues to efficiently access and retrieve data from multiple external systems - such as Oracle ERP, MyDSO credit management system, and internal product databases - directly within the Salesforce.com interface, thereby providing accurate and timely\nresponses to customer inquiries.​\nAutomated Summary and Response Generation - \nTo aid our CE agents the AI should draft responses to customer queries and supervise cases within SFDC. This should allow us to be faster in our responses and aid the CE colleagues in focusing on the content more than email generation", "Governance Notes": null, "Timing Considerations": "Go live on Q-4", "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": "SFDC, Oracle (API or Azure), MyDSO, Pbi, Labeling Table", "AI Solution or Tools of Interest": "CE EU Routing Agent - Generative AI to read emails (incl. the history), open and read attachments and match the content with the provided routing logic. Agentic AI and / Or SFDC integration to create cases and provide summaries. \nCE EU RAG Salesforce - Generative AI to read emails (incl. the history), open and read attachments and understand the query / task / question. Then it should translate that into a technical query and retrieve relevant information from the respective system / DB and display it to an agent\nAutomated Summary and Response Generation - Based on the content of the customer emails and the retrieved information (use case 2), the Gen-AI model should draft a response, matching the right tone and including the relevant details before the CE agent can validate and submit. He should be able to interact with it and adjust the content.", "Build Status": "2-In Progress", "Does it leverage AI on Products?": "FALSE", "Build Notes": "Slalom Initiative.", "PV ID": "1006865", "Risk Level": "High", "In Scope": "Yes", "Modified By": "Elizondo, Carlos", "Submission Date": " ase": "AI for Email Order Entry", "AI Product": null, "Delivery Owner": "AI Office", "Status": "In-Progress", "Current Phase": "1. Ideation", "Lifecycle Sub-Step": "04. Risk Review", "AI Governance Step": "Pending Risk Review", "AI PO": "De la Torre, Gustavo", "AI Strategist": "Heller, Amanda", "Buy/Build/Adapt": "Build", "Submitter": "Vanabel, Jesse", "Business Partner": "Giandiletti, Kimberly", "Business Area": "Instruments", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIIntakeTeam/EZ4YlGDgzVpBnTXfemRGrdsB56mfW1cPX-5aaJNL-ahGrQ?e=K4sxfq", "Comments": "11/11 --> Fer to check with Carlos and Kimberly on what is needed. 11/13 --> Moved for next year, probably. 12/15 --> Creating LoE for projects", "Problem Statement": null, "Description": "INSTRUMENTS\nBy leveraging AI to revolutionize our order entry process, we are poised to deliver substantial operational and strategic value to our call center. The deployment of automated email review and entry solutions will eliminate up to 90% of manual email order handling, enabling agents to focus on more complex, customer-centric tasks. This targeted automation will streamline workflows, improve service delivery, and significantly elevate both productivity and employee morale.\nCurrently, the INST call center dedicates over 2,200 minutes each day to processing approximately 275 email orders. Through automation, this effort can be reduced by an estimated 1,980 minutes daily, resulting in a weekly savings of 165 hours, or 8,580 hours annually. The reclamation of these hours offers a strategic advantage: enhancing workforce capacity, supporting future scalability, and strengthening our commitment to exceptional customer service. This initiative directly aligns with our core business objectives of operational efficiency, sustainable growth, and service excellence.\nFurthermore, the highly manual nature of the current order entry process often results in errors, with an accuracy rate of 89.33%. Our goal is to achieve world-class standards by improving accuracy to 99%. Addressing these inefficiencies will minimize duplicate orders, incorrect shipments, and customer credits—ultimately fostering greater customer satisfaction and boosting the confidence of our sales teams.\nCOMM, ENDO and SPORTS MED are also interested in this functionality.\nSuccess Criteria:\nImprove first time quality of email orders to 99%\nReduce processing time of orders by 30%.  \nProcess email orders 7x24 as opposed to M-F business hours.\nReduce the number of customer credits, duplicate orders, etc. over the long term.\nOverall, increase satisfaction among customers and salespeople – NPS Score.\nData Source & Usage:\nThe data that is validated and reviewed in this process include customer name, ship to address, account number, product number, price (contract and list), type of order (bill only, no charge, capital, etc.), delivery date, delivery method, etc.  The sources of this data include the customer purchase order, Salesforce, Model N, SAP, CPQ, etc.", "Governance Notes": "10/24/2025: Pending LOEs, budgeting to continue with Risk Review.\n11/10/2025: No immediate risk review (seeking estimates/not close to activation)", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "Low", "In Scope": "Yes", "Modified By": "Abreu, Matthew", "Submission Date": "9/2/25", "Created": "9/4/25 10:27", "Submission Year": "2025", "Intake & Triage Date": "9/23/25", "Risk Review Date": null, "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": null, "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "No", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc "Delivery Owner": "Division", "Status": "Completed", "Current Phase": "6. Approved not by AI ARC", "Lifecycle Sub-Step": "05. Submit Demand", "AI Governance Step": "Pending Assessments / AI ARC", "AI PO": "Heller, Amanda", "AI Strategist": "Heller, Amanda", "Buy/Build/Adapt": "Co-Build", "Submitter": "Fechner, Alex", "Business Partner": "Braddock, Keith", "Business Area": null, "Executive Summary": null, "Build Lead": null, "Priority": null, "Risk Assessment": "/:x:/s/AIStrategy/EUs8I0Y5jRFLuYG-wQNis0UBf3IppAGTlrlJMniN2ut4aQ?e=VpP5z1", "Comments": "11/11: Mike to follow up with Amanda", "Problem Statement": null, "Description": "OSEP support demand is rapidly increasing, overwhelming the support channel and limiting the team’s ability to focus on development and product support. A web-based AI chatbot, leveraging indexed OSEP documentation, is needed to provide accurate, up-to-date answers, reduce repetitive manual support, and improve self-service for engineers.", "Governance Notes": "Alex will be able to present his use case until the end of October. Follow up with him the last week. Pending to send AI Intake&Triage invite for Oct 28th.\n10/23/2025: Invite sent", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": "The OSEP Chatbot is a web-based AI assistant that leverages Azure Cognitive Search (LLM) with an Azure AI Search Index over OSEP documentation stored in Azure Blob Storage. It provides instant, accurate answers to user prompts by indexing OSEP documentation, knowledge articles, and technical project files (e.g., README.md from GitLab/Artifactory).\n\nFeatures & Functions\n\t•\tWeb-based custom UI for user interaction\n\t•\tIntegration with Azure Cognitive Search and Blob Storage\n\t•\tIndexed access to OSEP docs, technical documentation, and knowledge articles\n\t•\tInstant response capability, reducing response time from ~10 minutes to 0\n\t•\tSupport for OSEP-related queries only, ensuring relevance and compliance", "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "High", "In Scope": "Yes", "Modified By": "Elizondo, Carlos", "Submission Date": "9/1/25", "Created": "9/4/25 11:20", "Submission Year": "2025", "Intake & Triage Date": "10/28/25", "Risk Review Date": "10/29/25", "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": "1/6/26", "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "Yes", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc link. Level of Effort": null, "Doc link. Functional Design Document": null, "Doc link. Technical Design Document": null, "Doc link. Application Installation Quallification (AIQ)": null, "Doc link. Code Review": null, "Doc link. Runbook": null, "Doc link. Hypercare Exit Criteria": null, "Doc link. SIT Test Scripts": null, "Doc link. UAT Test Scripts": null, "Modified": "3/27/26 7:15", "Total Priority": "34", "AI Validation Status": "Not Required", "AI Monitoring Required": "Not Required", "AI Safety and Performance Status": "Completed", "Financial ROI": null, "Strategic Priority": null, "Continuity": null, "Regulatory priority level": null, "Total Priority McKensey": "0", "Business Unit: Group": "Other", "LOE Tshirt Size": null, "Projected Value $": null, "Doc link. BCFM": null, "Doc link. URS Requirements": null, "ROM / LOE Total Amount": null, "Feasibility (Complexity & Data Readiness)": null, "Scalability or Reusability": null, "Total Priority -Opt": "0"}, {"ID": "119", "Use Case": "ProCare Business Report Card", "AI Product": null, "Delivery Owner": "AI Office", "Status": "In-Progress", "Current Phase": "1. Ideation", "Lifecycle Sub-Step": "04. Risk Review", "AI Governance Step": "Pending Risk Review", "AI PO": "De la Torre, Gustavo", "AI Strategist": "Heller, Amanda", "Buy/Build/Adapt": "Build", "Submitter": "Giandiletti, Kimberly", "Business Partner": "Giandiletti, Kimberly", "Business Area": "Instruments", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIStrategy/ERH133wDGPVDtEume5WBk1kBNWT5wBgIDmnwm480PpShVg?e=fFEoAJ", "Comments": "11/11: Fer to check with Carlos and Kimbely on LOE to move forward.11/13 --> Moved for next year, probably", "Problem Statement": null, "Description": "Executive Summary (Use Case Overview): \nThe ProCare Business Report Card initiative aims to transform how customer account performance and service interactions are evaluated and communicated. Currently, compiling these statistics is a manual, time-intensive process that can hinder timely insights and strategic decision-making. By introducing an automated reporting system that draws data from platforms like SAP, ServiceMax, and Salesforce, Stryker seeks to streamline reporting, enhance the quality of account analyses, and support the ProCare Team in identifying trends, addressing recurring service issues, and uncovering new business opportunities.\nThe automated reports will offer clear, visually appealing summaries of service history, response times, and contract performance, empowering teams to make more informed decisions and proactively manage customer relationships. This initiative is expected to improve customer satisfaction through enhanced transparency, increased efficiency, and better support for sales, renewals, and strategic planning—ultimately enabling Stryker to deliver superior customer care and drive business growth.\nStrategic Alignment to Our Business Objectives:\nThe initiative aligns the Instruments Strategy and Business Objectives to streamline sales requests and interactions leading to increased quality and efficiency and to scale for future growth.\nBusiness Case\nValue\nINSTRUMENTS\nToday, it is a very manual process to pull account performance statistics to evaluate the viability of a customer and to provide a customer with the reason to purchase or renew their ProCare contract.  By providing a streamlined systematic way to present the data it will be easier for the ProCare Team to draw insights into the companies that can impact pricing and account strategies.  It will also assist the Sales Teams to upselling and cross new equipment.  The reports may be utilized in the selling cycle as well as in Quarterly Business Reviews.\nThe value these Report Cards bring are vast.  The benefits range from helping with managing the renewal process, maintaining a continuous focus on the customer, increasing brand recognition, impact pricing, and increasing the number of the renewals. \nThe current process of compiling account performance statistics and summarizing customer service interactions is highly manual and time-consuming. This often limits the ProCare Team’s ability to quickly identify key trends or address service issues in a timely manner. By developing an automated reporting solution that generates professional, visually appealing presentations using data sourced from systems such as SAP, ServiceMax, and Salesforce, Stryker can transform how customer service data is leveraged.\nAutomated reports would provide clear, concise summaries of the services customers receive, highlighting important metrics such as service history, response times, and contract performance. These insights would empower the ProCare Team to proactively spot trends, identify recurring issues, and recognize opportunities for improvement or upselling. Moreover, having timely and accurate presentations at their fingertips would support sales efforts, account reviews, and strategic planning, all while reducing manual administrative workload.\nThe value of this initiative includes enhanced customer satisfaction through improved service transparency, more informed account management decisions, and increased operational efficiency. Ultimately, this automated reporting and presentation system would position Stryker and the ProCare Team to deliver a higher standard of customer care while supporting business growth.\nTo put this type of report together today, it would require multiple data sources and multiple resources and would often take days to compile this data. We would likely need to build out an entire team to be able to pull and maintain these types of reports today which is not realistic. We are also only creating these types of reports for priority customers, and it is an ad-hoc process. By being able to quickly and accurately compile these reports for any customers with the minimal amount of time and resources required, we will increase our renewal rate and customer retention and should also be able to better sell the value of ProCare to new clients. All in all, this should help to both retain and grow our business with both large and small customers. This allows us to have a consistent level of care for each customer regardless of their contract size.\n\nKey Metrics:\n1.\tROI – Repair Service Report (ProCare Value):\na.\tIntended as a near-automated ROI model, potentially a spin-off of the Contract Report.\nb.\tAll relevant data already exists within the current Contract Report.\nc.\tLogic is mapped in Excel; collaboration with Sam Wiedmayer planned.\nd.\tExample: $200K under contract vs. $300K in service value generated goes into ROI calculation.\n2.\tPO Customer Reporting:\na.\tConsider building ROI reports for PO-based customers as well.\nb.\tShow what they’re currently paying and the value/opportunity available through ProCare.\n3.\tOn-Time Completion Rate:\na.\tMeasure expected vs. actual service dates, including paperwork submission.\nb.\tFor PMs: service must occur within 30 days.\nc.\tFor Power contracts: e.g., 6 visits planned, how many completed on time?\nd.\tNext Step: Follow-up call required. Josh is sending related On Time metric reports.\n4.\tDepot Repair Turnaround Time:\n a. Track same-day shipments and advanced exchanges/loaners.\n b. Measure time taken to complete actual repair.\n5.\tVisit Completion Metrics:\na.\tTrack eligible vs. completed visits (e.g., 3 eligible visits over 18 months — were they all completed?).\n6.\tEquipment Uptime:\na.\tMeasure percentage of time equipment was operational and in which state.\n7.\tPricing Metrics:\na.\tEvaluate pricing in relation to customer contract value and service levels.\nb.\tConsider variance in pricing between multimillion-dollar contracts with floor pricing vs. smaller ($100K) contracts.\nc.\tExplore coverage percentage of equipment via ProCare vs. transactional spending.\n8.\tProactive vs. Reactive Visits:\na.\tMeasure how many issues were discovered during proactive PM visits.\n9.\tCustomer devices failure rates vs. average\na.\tShows how well customers are taking care of their equipment\nb.\tMay allow for AI insights into best practices for reducing failures\n10.\tIncorporate SEM data\na.\tShow how balanced their device usage is across the fleet\n11.\tCustomer Loaner performance \na.\tHelps make the scorecard representative of both parties performance\nb.\tAre there outstanding delinquent loaners that we could draw attention to?\nc.\tIs there an average day of return we can share?\n12.\tUptime cost savings\na.\tCalculation based on the uptime of having a ProCare agreement and the same-day shipments delivered vs. standard repair lead time\n\n\n\nSuccess Criteria:\nBeing able to generate a professional looking presentation with compelling business information about the ProCare Account, including:\n•\tAccurate data\nData Source & Usage:\nThe data utilized for these key performance indicators would be sources from multiple systems including SAP, ServiceMax, Salesforce, etc.\nThe calculations would include:\n•\tROI on the overall Account\n•\tNumber of ProCare Visits\n•\tProfitability of the account", "Governance Notes": "10/24/2025: Pending LOEs, budgeting to continue with Risk Review.\n11/10/2025: No immediate risk review (seeking estimates/not close to activation)", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": "1010532", "Risk Level": "Medium", "In Scope": "Yes", "Modified By": "Abreu, Matthew", "Submission Date": "8/13/25", "Created": "9/4/25 11:27", "Submission Year": "2025", "Intake & Triage Date": "9/23/25", "Risk Review Date": null, "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": null, "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "No", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc link. Level of Effort": null, "Doc link. Functional Design Document": null, "Doc link. Technical Design Document": null, "Doc link. Application Installation Quallification (AIQ)": null, "Doc link. Code Review": null, "Doc link. Runbook": null, "Doc link. Hypercare Exit Criteria": null, "Doc link. SIT Test Scripts": null, "Doc link. UAT Test Scripts": null, "Modified": "3/23/26 14:15", "Total Priority": "50", "AI Validation Status": "Not Assessed", "AI Monitoring Required": null, "AI Safety and Performance Status": "Required", "Financial ROI": "5", "Strategic Priority": "5", "Continuity": "3", "Regulatory priority level": "0", "Total Priority McKensey": "13", "Business Unit: Group": "Commercial US", "LOE Tshirt Size": "Medium $250k", "Projected Value $": "$500,000.00", "Doc link. BCFM": null, "Doc link. URS Requirements": null, "ROM / LOE Total Amount": "$250,000.00", "Feasibility (Complexity & Data Readiness)": "3", "Scalability or Reusability": "4", "Total Priority -Opt": "77"}, {"ID": "120", "Use Case": "M&A Data Pond Chatbot", "AI Product": null, "Delivery Owner": null, "Status": "On Hold", "Current Phase": "4. Design & Build", "Lifecycle Sub-Step": "11. Active Downstream Assessments", "AI l, "Feasibility (Complexity & Data Readiness)": "5", "Scalability or Reusability": "4", "Total Priority -Opt": "98"}, {"ID": "124", "Use Case": "Comm Ops CS Agents", "AI Product": null, "Delivery Owner": null, "Status": "On Hold", "Current Phase": "1. Discovery", "Lifecycle Sub-Step": "02. Intake & Triage", "AI Governance Step": "Pending Risk Review", "AI PO": "Heller, Amanda", "AI Strategist": "Heller, Amanda", "Buy/Build/Adapt": "Co-Build", "Submitter": "Gonzalez, Natalia", "Business Partner": "Lalomia, Carlo", "Business Area": "Joint Replacement", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIStrategy/ESYRwGoyhkRJiiiuAFIHDGkBpQgGMoQJ4CBCMR61nUO7XA?e=5KV7ku", "Comments": "11/11 --> Mike to follow up with Amanda", "Problem Statement": null, "Description": "Chat Bots\nExternal Customers – help with tier 1 support, order inquiries, product recommendations. Integrate with Power Automate to triage complex requests, create support tickets and send emails.\nInternal Employees – provide a chat experience in Microsoft Teams for CS reps to easily chat with our Power BI data. Also to answer CS specific questions using Stryker knowledge and data sources.\nProcess Automation\nSit with CS reps to see what day-to-day processes we can automate.\nExtract information from customer documents (surgery sheets, POs) and match it to webops cases or oracle orders.\nMemorial Hermann customer – automate the process of extracting data sent from IT and formatting it into a customer specific format. (creating a bill summary document)", "Governance Notes": "Connect Connor with Amanda and Tim to review\nCopilot Studio access, discuss use cases, and determine if existing solutions can be leveraged or if\nnew development is needed. He is still looking to get access to copilot studio.\n10/22/2025: Connor Meeks confirmed to present his use case on 11/05, he is not able next week. Also, commented that he is still looking to get access to Copilot Studio.\n11/05/2025: Johnson, Matthew wanted to confirm if SalesOps has funding. Remove from today's agenda.", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "High", "In Scope": "Yes", "Modified By": "Willard, Richie", "Submission Date": "9/8/25", "Created": "9/11/25 11:07", "Submission Year": "2025", "Intake & Triage Date": "9/30/25", "Risk Review Date": null, "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": null, "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "Yes", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc link. Level of Effort": null, "Doc link. Functional Design Document": null, "Doc link. Technical Design Document": null, "Doc link. Application Installation Quallification (AIQ)": null, "Doc link. Code Review": null, "Doc link. Runbook": null, "Doc link. Hypercare Exit Criteria": null, "Doc link. SIT Test Scripts": null, "Doc link. UAT Test Scripts": null, "Modified": "4/20/26 13:36", "Total Priority": "30", "AI Validation Status": "Not Assessed", "AI Monitoring Required": "Not Assessed", "AI Safety and Performance Status": "Required", "Financial ROI": null, "Strategic Priority": null, "Continuity": null, "Regulatory priority level": null, "Total Priority McKensey": "0", "Business Unit: Group": "Commercial US", "LOE Tshirt Size": null, "Projected Value $": null, "Doc link. BCFM": null, "Doc link. URS Requirements": null, "ROM / LOE Total Amount": null, "Feasibility (Complexity & Data Readiness)": null, "Scalability or Reusability": null, "Total Priority -Opt": "0"}, {"ID": "125", "Use Case": "ProCare Contract Entry", "AI Product": null, "Delivery Owner": "AI Office", "Status": "In-Progress", "Current Phase": "1. Ideation", "Lifecycle Sub-Step": "04. Risk Review", "AI Governance Step": "Pending Risk Review", "AI PO": "De la Torre, Gustavo", "AI Strategist": "Heller, Amanda", "Buy/Build/Adapt": "Build", "Submitter": "Noonan, Chris", "Business Partner": "Giandiletti, Kimberly", "Business Area": "Instruments", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIStrategy/Ebvtqlz5QAtCsYpMN0AGNFsBU5p_rc7UaNAN55V_MEV9aA?e=wrRt62", "Comments": "11/11--> Fer to follow up with Kimberly. 11/13 --> Moved for next year, probably", "Problem Statement": null, "Description": "Business Case\nThe ProCare Contract Management Team is currently challenged by the increasingly complex and high-volume task of reviewing and entering contracts manually. With the business experiencing consistent double-digit annual growth, manual processes are becoming a bottleneck, introducing risks of incomplete or inaccurate data entry. These errors can significantly disrupt downstream operations including service validation, invoicing, and ultimately the customer experience.\nThis business case proposes the adoption of an AI-powered solution to automate the review and data entry of ProCare contracts. Leveraging advanced artificial intelligence technologies will streamline contract validation, drastically reduce human error, and increase operational capacity, positioning the organization for sustained growth and improved service quality.\nCurrent State and Challenges\nContract Volume and Team Strain\n•\tThe ProCare Contract Management Team manually processes approximately 4,500 contracts annually, with volume expected to grow by 10% each year for at least the next five years.\n•\tThe current contract portfolio represents roughly $376 million in sales, with continual increases in contract complexity and number.\n•\tThe team’s manual review encompasses validation of customer details, product serial numbers, purchase order accuracy, pricing, terms and conditions, signatures, and document consolidation.\n•\tContracts are entered into the SAP system via CPQ (Configure Price Quote), and confirmation emails are sent to sales personnel post-entry.\nError Rates and Business Impacts\n•\tManual entry error rates range between 5–10%, causing issues in contract data that impact service validation, invoicing, and customer satisfaction.\n•\tHuman error has led to missed opportunities and downstream operational inefficiencies, particularly at critical fiscal periods (end of month, quarter, and year).\n•\tBusiness growth is exacerbating the strain on existing resources, threatening the ability to maintain service quality and meet operational SLAs.\nKey Pain Points\n•\tTime-consuming manual validation and entry steps increase the risk of bottlenecks.\n•\tSuboptimal data accuracy affects billing, reporting, and customer communications.\n•\tLack of scalability in current processes threatens future expansion and agility.", "Governance Notes": "10/24/2025: Pending LOEs, budgeting to continue with Risk Review.\n11/10/2025: No immediate risk review (seeking estimates/not close to activation)", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "Medium", "In Scope": "Yes", "Modified By": "Abreu, Matthew", "Submission Date": "8/12/25", "Created": "9/11/25 14:27", "Submission Year": "2025", "Intake & Triage Date": "9/23/25", "Risk Review Date": null, "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": null, "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "No", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc link. Level of Effort": null, "Doc link. Functional Design Document": null, "Doc link. Technical Design Docum y are mandated to be provided by both the Civil Rights Act & the ACA, but depending on the resources a health system has, they may not be available for every interaction a nurse/clinician would have with their non-english speaking patient.", "Description": "Vocera has an opportunity to provide an AI based \"translator on a badge\" experience where badge users can issue the command \"Call the translator\", specificy which language they would want to translate between (i.e. English to Spanish), and then have the Badge act as the translator between the nurse and their patient. Specifically the badge would listen to one user (i.e. speaking english), translate the string of text to the other language, and then annunciate it out loud for the other listener to hear. The other user could respond in Spanish and then have that translated to English. This would continue until the session is complete and the user hits the \"call button\" on the badge.", "Governance Notes": "11/11/2025: Matt requested priority to this use case. He will present it on Nov 18th Intake & Triage.\n11/18/2025: I&T Continue with risk review.\n11/19/2025: Risk Review: Continue with asssessments. Share timeline and relevant details with Matthew to\nfacilitate AIOC review and broader group discussion for the Vocera AI interpreter use case, including\nongoing coordination as needed.\n03/02/2026: This use case will be added in the next March AIOC review so they can close the follow up items and approve. 1st AI OC 12/11/2025 and next one 03/12/2026.", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "High", "In Scope": "Yes", "Modified By": "Abreu, Matthew", "Submission Date": "11/4/25", "Created": "11/7/25 5:28", "Submission Year": "2025", "Intake & Triage Dat s and impact customer satisfaction and financial outcomes.\nGenesys provides a robust suite of AI capabilities within its omnichannel software, including the Auto Call Summary and Wrap Up Code feature. Although Stryker has implemented Genesys for several years, this particular AI-driven functionality remains untapped. The Instruments division has identified significant potential in leveraging this feature to enhance operational efficiency and the customer experience.\nThe Auto Call Summary and Wrap Up Code feature is designed to automatically generate structured conversation summaries and assign the appropriate wrap up codes for every customer phone interaction. These summaries are then seamlessly stored within Salesforce. By utilizing AI to document calls, the process not only streamlines after-call administrative tasks but also enables agents to focus entirely on customer needs and requests during conversations.\nAdopting this technology would deliver measurable value to Stryker Instruments by improving the consistency and quality of call documentation, reducing manual workload for agents, and ensuring accurate tracking of customer interactions. Ultimately, this enhancement will elevate the customer experience and drive greater efficiency within the call center, leveraging data that Genesys is already collecting.\nThe initiative seeks to leverage advanced AI capabilities to enhance the accuracy of customer interaction documentation, significantly reduce after-call work time, and improve the quality of accounts receivable (AR) request and dispute records. Aligning with Stryker Instruments’ strategic objectives to streamline sales requests and scale for future growth, this proposal positions Instruments as the first division in North America Commercial to adopt the feature, paving the way for future scalability to other interested divisions, including Medical, NV, ENDO, and Sports MED.", "Governance Notes": "11/25/25: Add-on fast-track", "Timing Considerations": nul o", "AI Strategist": null, "Buy/Build/Adapt": "Buy", "Submitter": "Vanabel, Jesse", "Business Partner": "Giandiletti, Kimberly", "Business Area": "Instruments", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIStrategy/IQAD_1LOlvsUT7wCf8QL-X2OAYQF8NntQ3CbqVPxnMl4Zms?e=Cd7EGu", "Comments": "Duplicate with ID 181 Auto Call Summary and Wrap Up Code", "Problem Statement": null, "Description": "The Instrument Call Center Leadership is constantly looking for new ways to improve performance and the work life balance of their call center agents. \nFor over seven years, Stryker call centers globally have utilized Genesys’ omnichannel software to manage customer interactions. Despite this robust technology foundation, documentation of customer calls remains largely manual, resulting in inconsistent summaries, increased after-call work, and challenges in accurately tracking commitments, especially those related to AR requests and disputes. These documentation inefficiencies contribute to operational bottlenecks and impact customer satisfaction and financial outcomes.\nGenesys provides a robust suite of AI capabilities within its omnichannel software, including the Auto Call Summary and Wrap Up Code feature. Although Stryker has implemented Genesys for several years, this particular AI-driven functionality remains untapped. The Instruments division has identified significant potential in leveraging this feature to enhance operational efficiency and the customer experience.\nThe Auto Call Summary and Wrap Up Code feature is designed to automatically generate structured conversation summaries and assign the appropriate wrap up codes for every customer phone interaction. These summaries are then seamlessly stored within Salesforce. By utilizing AI to document calls, the process not only streamlines after-call administrative tasks but also enables agents to focus entirely on customer needs and requests during conversations.\nAdopting this technology would deliver measurable value to Stryker Instruments by improving the consistency and quality of call documentation, reducing manual workload for agents, and ensuring accurate tracking of customer interactions. Ultimately, this enhancement will elevate the customer experience and drive greater efficiency within the call center, leveraging data that Genesys is already collecting.\nThe initiative seeks to leverage advanced AI capabilities to enhance the accuracy of customer interaction documentation, significantly reduce after-call work time, and improve the quality of accounts receivable (AR) request and dispute records. Aligning with Stryker Instruments’ strategic objectives to streamline sales requests and scale for future growth, this proposal positions Instruments as the first division in North America Commercial to adopt the feature, paving the way for future scalability to other interested divisions, including Medical, NV, ENDO, and Sports MED.", "Governance Notes": "11/25/2025: Matt: No AI Op Co meeting necessary for this fast-track pilot.", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "Medium", "In Scope": "Yes", "Modified By": "Abreu, Matthew", "Submission Date": "11/25/25", "Created": "12/15/25 5:32", "Submission Year": "2025", "Intake & Triage Date": null, "Risk Review Date": null, "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": "12/9/25", "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "No", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc link. Level of Effort": null, "Doc link. Functional Design Document": null, "Doc link. Technical Design Document": null, "Doc link. Application Installa bility (Complexity & Data Readiness)": null, "Scalability or Reusability": null, "Total Priority -Opt": "0"}, {"ID": "203", "Use Case": "EC Customer Success - Contracts Ai", "AI Product": null, "Delivery Owner": null, "Status": "New Submission", "Current Phase": "1. Discovery", "Lifecycle Sub-Step": "04. Risk Review", "AI Governance Step": "Pending Assessments / AI ARC", "AI PO": "De la Torre, Gustavo", "AI Strategist": null, "Buy/Build/Adapt": "Buy", "Submitter": "Smith, Carrie", "Business Partner": "Cubacha, Maria", "Business Area": "Cross-Divisional", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIStrategy/IQBdlvG3Xl1GTLaHmGOLFK8uASGu1cOTFRUQHj_oMQJHUnY?e=bCCmcR", "Comments": null, "Problem Statement": "We currently lack end to end visibility, tracking, and intelligence across the full contract lifecycle from initial bid through negotiation, execution, performance, and renewal. Contract data is fragmented across systems including contracts, co op programs, finance, bids, and security assessments, with no centralized or queryable source of truth. As a result, we have limited insight into compliance with our own contract standards, pricing changes, co op obligations, expiration dates, and revenue protection mechanisms.\n\nThere is no systematic tracking of key contract milestones such as pricing changes, amendments, or expiration dates, no automated alerts ahead of renewals, and no ability to quickly query contract performance metrics. This creates hidden financial and compliance risk, delayed and reactive decision making, poor prioritization, misalignment across teams, slow response times, and exposure to financial leakage including missed renewals and revenue left on the table.", "Description": "We need a smart, flexible Contracts AI solution that provides centralized visibility and intelligence across the entire contract lifecycle. The system must enable structured tracking from bid submission through legal neg ainment (SPA), backorders, and supplier performance—necessitating an automated, GenAI‑based solution.\n\nToday, OTIF (On‑Time, In‑Full) analysis is largely manual, partial, and reactive, limiting our ability to consistently improve delivery performance and supply‑chain execution.\n\nEach month, Buyers can only prioritize a small subset of\" top\" Non‑OTIF contributors, leaving the majority of PO lines unanalyzed due to time and capacity constraints.  \n\nOTIF root‑cause identification requires manual review of hundreds of PO lines per month, consuming significant effort and delaying corrective action.  \n\nThe opportunity costs are unnecessary interruptions in supply to the plant sites, increased backorders, weakened supply-planning KPIs, lower SPA and increased escalations.\n\nAs volume continues to scale, the current approach is not sustainable and creates operational risk.", "Governance Notes": "02/27/2026: Check why Model Performance testing is not marked.\n03/02/2026: Matt´s meeting: Schedule I&T\n03/19/2026: Eric contacted me that he is working full with the system restoration and will not be able to attend I&T meeting (March 24th). I proposed to re schedule but he is not ready to present because is waiting use case estimates (POC completed last year)", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": "1006896", "Risk Level": "Low", "In Scope": "Yes", "Modified By": "Perez, Alfonso", "Submission Date": "2/27/26", "Created": "2/27/26 14:09", "Submission Year": "2026", "Intake & Triage Date": null, "Risk Review Date": null, "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": null, "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "No", "ADO Epic": null, "Doc li lly, building technical documentation from scratch and then trying to find documentation takes time. \n\nEnter Varicent's Designer Assitant,  a chat based user interface that converts natural language into Varicent Incentive calculations and vice versa. By using the requirements as written, developers can save up to 20% of build effort by having the Designer Assistant build an initial mapping off of those requirements. Also, having an interface that can assistant in the building process enables less technical resources, such as the sales compensation teams to support in the comp plan building process, eliminating resource bottlenecks. Finally, once built, the developer, or anyone who is trying to understand a compensation plan can use the designer assitant to provide technical and functional documentation, saving time.\n\nIn short, this tool will help save developer time in the initial build out of compensation plans and creation of documentation, support eliminating resource bottlenecks, and save support/business time in locating documentation to explain the system.", "Governance Notes": "03/06/2026: I had a meeting with Thomas and explained the process. I need to check if this could be fast tracked.\nVaricent is the tool (Not approved yet)\nThey bought Varicent and AI capabilities are included in the package.\nThis is very similar to ELT assistant.\nIt is a chat bot that performs actions - Dev assistant\n03/09/2026: Skip I&T. Risk review required.\n03/25/2026: Risk Rev: Use case risk is accurate (High), acceptable, and no escalation to the AI Operating Committee is required. Thomas agreed to contact IT security for confirmation and update the group, with Olivier suggesting offline approval if no new concerns arise.", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", {"ID": "244", "Use Case": "Benevity AI External Match Assurance", "AI Product": null, "Delivery Owner": null, "Status": "In-Progress", "Current Phase": "3. Evaluation", "Lifecycle Sub-Step": "11. Active Downstream Assessments", "AI Governance Step": "Pending Assessments / AI ARC", "AI PO": null, "AI Strategist": null, "Buy/Build/Adapt": "Add-On", "Submitter": "Mihill, Vini", "Business Partner": "Roland, Terrence", "Business Area": "Cross-Divisional", "Executive Summary": null, "Build Lead": null, "Priority": "Routine", "Risk Assessment": "/:x:/s/AIStrategy/IQBdbkFize3oQKhfpyxJOQgsAcwiUvrQRNNFrmXWs_7_fZo?e=hrblEg", "Comments": null, "Problem Statement": null, "Description": "Employees can unlock their company match for donations made to nonprofit partners on Impact by uploading a donation receipt. Employees are not required to use this feature to access their match benefit, and any documentation they upload is their decision. To be approved, receipts must meet strict quality standards that verify the donation was made to a qualified nonprofit and that no goods or services were received in return. Currently, our team pays a $17,000 annual fee on a limited number (1,200) of manual receipt reviews conducted by Benevity for submissions above a certain threshold. The Benevity team executes our preferred standards for receipt validation. We are charged per review, and resubmissions count against our allowed amount of manual reviews. In 2025, employees submitted 2,229 match requests using this process, and 1,128 required manual review by the Benevity team. Of the manually reviewed receipts, we had a 30.5% rejection rate (344 rejections). Of those rejected, 34% (116) were due to missing name, donation date or nonprofit organization.\n\nEmployees have expressed frustration with this experience, in part because receipt requirements are documented separately in a document housed on Connect rather than being integrated into the submission process. Further, if rejected, employees must resubmit the request entirely, which increases the volume of receipts that require manual review.\n\nBenevity has recently introduced an AI‑powered feature that pre‑screens donation receipts in real time and alerts employees to any issues directly on the submission screen. This enables employees to correct errors and re‑upload appropriate documentation before completing their submission. When an employee uploads a receipt, an A.I. validator scans the document and extracts four key pieces of information to auto-populate the form: donor name, donation amount, donation date, and nonprofit organization name. If this feature had been enabled in 2025, at least  34% (116) of the 1,128 manually reviewed receipts were resubmissions which could have been avoided.", "Governance Notes": "03/09/2026: Benevity is a company wide approved enterprise tool.\nThe AI feature itself is an optional tool that employees can use to get their company match for donations they made to an eligible nonprofit\n03/09/2026: No I&T.\n04/08/2026: Risk Review: Use case risk is accurate (Medium), acceptable, and escalation to the AI Operating Committee is not required. Complete the downstream reviews/assessments", "Timing Considerations": null, "Is Real Data Required?": "TRUE", "Does it Drive Internal Efficiency?": "TRUE", "Data Scope": null, "AI Solution or Tools of Interest": null, "Build Status": "0-Not Assigned", "Does it leverage AI on Products?": "TRUE", "Build Notes": null, "PV ID": null, "Risk Level": "Medium", "In Scope": "Yes", "Modified By": "Abreu, Matthew", "Submission Date": "3/6/26", "Created": "3/9/26 14:13", "Submission Year": "2026", "Intake & Triage Date": null, "Risk Review Date": "4/8/26", "AI OC Review Date": null, "AI GB Review Date": null, "AI ARC Complete Date": null, "Deployment/Approval Date": null, "Completion": "0%", "Stakeholders": null, "In Build Team Scope": "No", "ADO Epic": null, "Doc link. Funding Commitment Form": null, "Doc link. Level of Effort": null, "Doc l const FILTER_COLS = ['Status','Current Phase','Business Area','Business Unit: Group','Buy/Build/Adapt','Priority','Risk Level','In Scope','In Build Team Scope','AI Validation Status','AI Monitoring Required','Delivery Owner','AI PO','Submission Year','LOE Tshirt Size'];

const ALL_COLS = Object.keys(DATA[0]);
const DEFAULT_COLS = ['ID','Use Case','Status','Current Phase','Business Area','Buy/Build/Adapt','Risk Level','Priority','Total Priority','Total Priority -Opt','Submission Year','AI PO'];
const NUM_COLS = new Set(['ID','Total Priority','Total Priority McKensey','Total Priority -Opt','Financial ROI','Strategic Priority','Continuity','Regulatory priority level','Feasibility (Complexity & Data Readiness)','Scalability or Reusability']);

const NOTES = JSON.parse(localStorage.getItem('fde-hub-notes') || '{}');
function saveNotes() { localStorage.setItem('fde-hub-notes', JSON.stringify(NOTES)); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const EXPAND_FIELDS = ['Problem Statement','Description','AI Solution or Tools of Interest','Comments','Executive Summary'];
let expandedIds = new Set();

let visibleCols = [...DEFAULT_COLS, 'Notes'];
let filters = {};
let excludes = {};
let searchQ = '';
let sortCol = 'Total Priority';
let sortDir = -1;
let page = 0;
let pageSize = 50;
let filtered = [];

function getOpts(col) {
  const s = new Set();
  DATA.forEach(r => { if(r[col] != null && r[col] !== '') s.add(String(r[col])); });
  return [...s].sort();
}

function buildFilters() {
  const fr = document.getElementById('filter-row');
  fr.innerHTML = '';
  FILTER_COLS.forEach(col => {
    const opts = getOpts(col);
    if(!opts.length) return;
    const sel = document.createElement('select');
    sel.innerHTML = `<option value="">— ${col} —</option>` + opts.map(o=>`<option value="${o}"${filters[col]===o?' selected':''}>${o}</option>`).join('');
    sel.onchange = () => { filters[col] = sel.value || undefined; page=0; render(); };
    fr.appendChild(sel);
  });
}

function buildColPanel() {
  const grid = document.getElementById('col-grid');
  grid.innerHTML = [...ALL_COLS, 'Notes'].map(c => `<label><input type="checkbox" value="${c}"${visibleCols.includes(c)?' checked':''}> ${c}</label>`).join('');
  grid.querySelectorAll('input').forEach(cb => {
    cb.onchange = () => {
      if(cb.checked) { if(!visibleCols.includes(cb.value)) visibleCols.push(cb.value); }
      else visibleCols = visibleCols.filter(c=>c!==cb.value);
      render();
    };
  });
}

function applyFilters() {
  filtered = DATA.filter(r => {
    if(searchQ) {
      const q = searchQ.toLowerCase();
      const hit = ['Use Case','AI Product','Submitter','Business Partner','Business Area','AI PO','AI Strategist'].some(c => r[c] && String(r[c]).toLowerCase().includes(q));
      if(!hit) return false;
    }
    for(const [col, val] of Object.entries(filters)) {
      if(val && String(r[col]||'') !== val) return false;
    }
    for(const [col, vals] of Object.entries(excludes)) {
      if(vals && vals.has(String(r[col]||''))) return false;
    }
    return true;
  });
  filtered.sort((a,b) => {
    const av = a[sortCol], bv = b[sortCol];
    if(av==null && bv==null) return 0;
    if(av==null) return 1; if(bv==null) return -1;
    if(NUM_COLS.has(sortCol)) return sortDir*(Number(av)-Number(bv));
    return sortDir*String(av).localeCompare(String(bv));
  });
}

function badgeClass(col, val) {
  if(col==='Status') return 'badge b-'+String(val).replace(/\s+/g,'-');
  if(col==='Risk Level') return 'badge b-'+val;
  if(col==='Buy/Build/Adapt') return 'badge b-'+String(val).replace(/\//g,'-');
  return '';
}

function renderTable() {
  const start = page*pageSize, end = start+pageSize;
  const slice = filtered.slice(start, end);
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr><th class="exp-col"></th>' + visibleCols.map(c => {
    const arr = c===sortCol ? (sortDir>0?'▲':'▼') : '⇅';
    const cls = c===sortCol?' class="sorted"':'';
    return `<th${cls} data-col="${c}">${c} <span class="arr">${arr}</span></th>`;
  }).join('') + '</tr>';
  thead.querySelectorAll('th[data-col]').forEach(th => {
    th.onclick = () => { if(sortCol===th.dataset.col) sortDir*=-1; else {sortCol=th.dataset.col;sortDir=-1;} page=0; render(); };
  });
  const tbody = document.getElementById('tbody');
  const colSpan = visibleCols.length + 1;
  tbody.innerHTML = slice.flatMap(r => {
    const id = r['ID'];
    const isExp = expandedIds.has(id);
    const mainRow = '<tr data-rowid="'+id+'">' +
      '<td class="exp-col"><button class="expand-btn" data-expid="'+id+'">'+(isExp?'▼':'▶')+'</button></td>' +
      visibleCols.map(c => {
        if(c==='Notes'){const note=NOTES[id]||'';return `<td class="note-cell" data-id="${id}">${note?`<span class="note-text">${escHtml(note)}</span>`:'<span class="note-empty">+ Add note</span>'}</td>`;}
        const v = r[c];
        if(v==null||v==='') return `<td style="color:#bbb">—</td>`;
        const bc = badgeClass(c, v);
        if(bc) return `<td><span class="${bc}">${v}</span></td>`;
        if(NUM_COLS.has(c)) return `<td class="num">${v}</td>`;
        if(String(v).length>40) return `<td><span class="trunc" title="${String(v).replace(/"/g,'&quot;')}">${v}</span></td>`;
        return `<td>${v}</td>`;
      }).join('') + '</tr>';
    if(!isExp) return [mainRow];
    const blocks = EXPAND_FIELDS.map(f => {
      const val = r[f];
      const body = val ? `<div class="dp-body">${escHtml(val)}</div>` : '<div class="dp-empty">—</div>';
      return `<div class="dp-block"><div class="dp-label">${escHtml(f)}</div>${body}</div>`;
    }).join('');
    const noteVal = NOTES[id] || '';
    const noteBlock = `<div class="dp-block"><div class="dp-label">My Notes</div>${noteVal?`<div class="dp-body">${escHtml(noteVal)}</div>`:'<div class="dp-empty">No notes added</div>'}</div>`;
    const detailRow = `<tr class="detail-row"><td colspan="${colSpan}"><div class="detail-panel">${blocks}${noteBlock}</div></td></tr>`;
    return [mainRow, detailRow];
  }).join('');
}

function renderStats() {
  const byStatus = {};
  filtered.forEach(r => { const s=r['Status']||'Unknown'; byStatus[s]=(byStatus[s]||0)+1; });
  const parts = Object.entries(byStatus).sort((a,b)=>b[1]-a[1]).map(([s,n])=>`<strong>${n}</strong> ${s}`);
  const withValue = filtered.filter(r=>r['Projected Value $']).length;
  document.getElementById('stats').innerHTML = `Showing <strong>${filtered.length}</strong> of <strong>${DATA.length}</strong> &nbsp;|&nbsp; ${parts.join(' &nbsp;·&nbsp; ')} &nbsp;|&nbsp; <strong>${withValue}</strong> with projected value`;
}

function renderExclTags() {
  const row = document.getElementById('excl-tags');
  row.innerHTML = '';
  for(const [col, vals] of Object.entries(excludes)) {
    vals.forEach(v => {
      const tag = document.createElement('span');
      tag.className = 'excl-tag';
      tag.textContent = `✕ Excl: ${col} = ${v}`;
      tag.onclick = () => { vals.delete(v); if(!vals.size) delete excludes[col]; page=0; render(); };
      row.appendChild(tag);
    });
  }
}

function renderPager() {
  const total = filtered.length;
  const maxPage = Math.max(0, Math.ceil(total/pageSize)-1);
  document.getElementById('pinfo').textContent = `Page ${page+1} of ${maxPage+1} (${total} rows)`;
  document.getElementById('prev').disabled = page===0;
  document.getElementById('next').disabled = page>=maxPage;
}

function render() {
  applyFilters();
  renderStats();
  renderExclTags();
  renderTable();
  renderPager();
}

document.getElementById('search').oninput = e => { searchQ=e.target.value; page=0; render(); };
document.getElementById('clear-btn').onclick = () => { filters={}; excludes={}; searchQ=''; document.getElementById('search').value=''; buildFilters(); page=0; render(); };
document.getElementById('psize').onchange = e => { pageSize=Number(e.target.value); page=0; render(); };
document.getElementById('prev').onclick = () => { if(page>0){page--;render();} };
document.getElementById('next').onclick = () => { page++; render(); };
document.getElementById('col-btn').onclick = () => {
  const p = document.getElementById('col-panel');
  p.style.display = p.style.display==='none'?'block':'none';
  if(p.style.display==='block') buildColPanel();
};
document.getElementById('csv-btn').onclick = () => {
  const allCols = [...ALL_COLS, 'Notes'];
  const rows = [allCols.join(','), ...filtered.map(r => allCols.map(c => JSON.stringify(c==='Notes'?(NOTES[r['ID']]||''):r[c]??'')).join(','))];
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(rows.join('\n'));
  a.download = 'ai_use_case_hub_filtered.csv';
  a.click();
};

document.querySelector('.table-wrap').addEventListener('click', e => {
  const expBtn = e.target.closest('.expand-btn');
  if(expBtn) {
    const id = expBtn.dataset.expid;
    if(expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id);
    renderTable();
    return;
  }
  const cell = e.target.closest('.note-cell');
  if(!cell || cell.querySelector('textarea')) return;
  const id = cell.dataset.id;
  cell.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.className = 'note-edit';
  ta.value = NOTES[id] || '';
  cell.appendChild(ta);
  ta.focus();
  ta.addEventListener('blur', () => {
    const val = ta.value.trim();
    if(val) NOTES[id] = val; else delete NOTES[id];
    saveNotes();
    cell.innerHTML = val ? `<span class="note-text">${escHtml(val)}</span>` : '<span class="note-empty">+ Add note</span>';
  });
});

buildFilters();
render();
</script>
</body>
</html>
